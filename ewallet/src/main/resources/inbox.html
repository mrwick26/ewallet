<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gee.KasZsx — History</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: #161b22; border-bottom: 1px solid #21262d; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .brand { font-size: 1.25rem; font-weight: 800; color: #fff; }
    .brand span { color: #00c896; }
    nav ul { list-style: none; display: flex; gap: 4px; }
    nav ul li a { color: #6e7681; text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 7px 14px; border-radius: 8px; transition: all 0.15s; }
    nav ul li a:hover { color: #e6edf3; background: #21262d; }
    nav ul li a.active { color: #00c896; background: rgba(0,200,150,0.1); }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .logout-btn { padding: 6px 14px; background: transparent; border: 1px solid #21262d; color: #8b949e; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-family: inherit; transition: all 0.15s; width: auto; }
    .logout-btn:hover { border-color: #f85149; color: #f85149; transform: none; }
    main { flex: 1; padding: 32px 28px; max-width: 860px; margin: 0 auto; width: 100%; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h2 { font-size: 1.2rem; font-weight: 700; color: #e6edf3; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid #21262d; background: #0d1117; color: #8b949e; font-size: 0.82rem; cursor: pointer; font-weight: 600; transition: all 0.15s; font-family: inherit; }
    .filter-btn.active, .filter-btn:hover { background: rgba(0,200,150,0.1); color: #00c896; border-color: rgba(0,200,150,0.3); }
    .tx-card { background: #161b22; border: 1px solid #21262d; border-radius: 14px; overflow: hidden; }
    .tx-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #21262d; transition: background 0.1s; }
    .tx-item:last-child { border-bottom: none; }
    .tx-item:hover { background: rgba(255,255,255,0.02); }
    .tx-left { display: flex; align-items: center; gap: 12px; }
    .tx-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; font-weight: 700; }
    .tx-icon.in { background: rgba(0,200,150,0.12); color: #00c896; }
    .tx-icon.out { background: rgba(248,81,73,0.12); color: #f85149; }
    .tx-desc { font-size: 0.88rem; font-weight: 600; color: #e6edf3; }
    .tx-sub { font-size: 0.78rem; color: #00c896; margin-top: 2px; font-weight: 500; }
    .tx-meta { font-size: 0.74rem; color: #6e7681; margin-top: 2px; }
    .tx-status { display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 4px; margin-left: 6px; font-weight: 600; }
    .tx-status.success { background: rgba(0,200,150,0.12); color: #00c896; }
    .tx-right { text-align: right; }
    .tx-amount { font-size: 0.95rem; font-weight: 700; }
    .tx-amount.in { color: #00c896; }
    .tx-amount.out { color: #f85149; }
    .tx-balance { font-size: 0.73rem; color: #484f58; margin-top: 3px; }
    .empty { text-align: center; color: #484f58; padding: 40px 0; font-size: 0.88rem; }
    footer { background: #161b22; border-top: 1px solid #21262d; color: #484f58; text-align: center; padding: 14px; font-size: 0.78rem; }
  </style>
</head>
<body>
<nav>
  <div class="brand">Gee.<span>KasZsx</span></div>
  <ul>
    <li><a href="/dashboard">Dashboard</a></li>
    <li><a href="/cashin">Cash In</a></li>
    <li><a href="/cashout">Cash Out</a></li>
    <li><a href="/inbox" class="active">History</a></li>
    <li><a href="/barcode">My QR</a></li>
    <li><a href="/profile">Profile</a></li>
  </ul>
  <div class="nav-right">
    <span>₱<span style="color:#00c896;font-weight:700" id="nav-balance">0.00</span></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>
<main>
  <div class="page-header">
    <h2>Transaction History</h2>
    <div class="filters">
      <button class="filter-btn active" onclick="filterTx('all', this)">All</button>
      <button class="filter-btn" onclick="filterTx('CASH_IN', this)">Cash In</button>
      <button class="filter-btn" onclick="filterTx('CASH_OUT', this)">Cash Out</button>
    </div>
  </div>
  <div class="tx-card" id="tx-list">
    <div class="empty">Loading transactions...</div>
  </div>
</main>
<footer>&copy; 2026 Gee.KasZsx — Secure Digital Payments</footer>
<script>
let allTxs = [];
async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href='/'; }
function fmt(dt) { return new Date(dt).toLocaleString('en-PH', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
function renderTxs(txs) {
  const list = document.getElementById('tx-list');
  if (!txs.length) { list.innerHTML = '<div class="empty">No transactions found</div>'; return; }
  list.innerHTML = txs.map(tx => {
    const isIn = tx.type === 'CASH_IN';
    const cls = isIn ? 'in' : 'out';
    const sign = isIn ? '+' : '-';
    const icon = isIn ? '↓' : '↑';
    const label = isIn ? 'Cash In' : 'Cash Out';
    // description holds "Received by Name · phone" or "Transferred by Name · phone"
    const descHtml = tx.description
      ? `<div class="tx-sub">${tx.description}</div>`
      : '';
    return `<div class="tx-item">
      <div class="tx-left">
        <div class="tx-icon ${cls}">${icon}</div>
        <div>
          <div class="tx-desc">${label}</div>
          ${descHtml}
          <div class="tx-meta">${fmt(tx.createdAt)} · ${tx.referenceNo}<span class="tx-status success">${tx.status}</span></div>
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amount ${cls}">${sign}₱${parseFloat(tx.amount).toFixed(2)}</div>
        <div class="tx-balance">Balance: ₱${parseFloat(tx.balanceAfter).toFixed(2)}</div>
      </div>
    </div>`;
  }).join('');
}
function filterTx(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTxs(type === 'all' ? allTxs : allTxs.filter(t => t.type === type));
}
async function loadData() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href='/'; return; }
  const u = await r.json();
  document.getElementById('nav-balance').textContent = parseFloat(u.balance).toFixed(2);
  const tr = await fetch('/api/transactions');
  allTxs = await tr.json();
  renderTxs(allTxs);
}
loadData();
</script>
</body>
</html>
