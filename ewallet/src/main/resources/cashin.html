<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gee.KasZsx — Cash In</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: #161b22; border-bottom: 1px solid #21262d; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .brand { font-size: 1.25rem; font-weight: 800; color: #fff; }
    .brand span { color: #00c896; }
    nav ul { list-style: none; display: flex; gap: 4px; }
    nav ul li a { color: #6e7681; text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 7px 14px; border-radius: 8px; transition: all 0.15s; }
    nav ul li a:hover { color: #e6edf3; background: #21262d; }
    nav ul li a.active { color: #00c896; background: rgba(0,200,150,0.1); }
    .nav-right { display: flex; align-items: center; gap: 14px; font-size: 0.82rem; }
    .logout-btn { padding: 6px 14px; background: transparent; border: 1px solid #21262d; color: #8b949e; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-family: inherit; transition: all 0.15s; width: auto; }
    .logout-btn:hover { border-color: #f85149; color: #f85149; transform: none; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 20px; padding: 36px 32px; width: 100%; max-width: 480px; }
    .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .card-icon { width: 52px; height: 52px; background: rgba(0,200,150,0.12); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #00c896; font-weight: 700; }
    .card-title h2 { font-size: 1.35rem; font-weight: 700; color: #e6edf3; }
    .card-title p { font-size: 0.82rem; color: #6e7681; margin-top: 2px; }
    .balance-badge { background: rgba(0,200,150,0.08); border: 1px solid rgba(0,200,150,0.2); border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; color: #8b949e; margin-bottom: 24px; }
    .balance-badge strong { font-size: 1.2rem; color: #00c896; font-weight: 700; }
    label { font-size: 0.78rem; font-weight: 600; color: #8b949e; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-wrap .icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 0.95rem; }
    input { width: 100%; padding: 12px 13px 12px 40px; background: #0d1117; border: 1.5px solid #21262d; border-radius: 10px; font-size: 0.92rem; color: #e6edf3; outline: none; transition: border-color 0.2s; font-family: inherit; }
    input:focus { border-color: #00c896; }
    input::placeholder { color: #484f58; }
    .quick-amounts { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .quick-btn { padding: 7px 15px; border: 1px solid #21262d; border-radius: 8px; background: #0d1117; color: #8b949e; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .quick-btn:hover { border-color: #00c896; color: #00c896; background: rgba(0,200,150,0.06); }
    button.submit { width: 100%; padding: 13px; background: linear-gradient(135deg, #00c896, #00a070); color: #fff; border: none; border-radius: 10px; font-size: 0.98rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.2s, transform 0.1s; margin-top: 4px; }
    button.submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .msg { margin-top: 14px; font-size: 0.85rem; padding: 12px 14px; border-radius: 8px; }
    .msg.error { background: rgba(248,81,73,0.1); color: #f85149; border: 1px solid rgba(248,81,73,0.2); }
    .msg.success { background: rgba(0,200,150,0.1); color: #00c896; border: 1px solid rgba(0,200,150,0.2); }
    footer { background: #161b22; border-top: 1px solid #21262d; color: #484f58; text-align: center; padding: 14px; font-size: 0.78rem; }
  </style>
</head>
<body>
<nav>
  <div class="brand">Gee.<span>KasZsx</span></div>
  <ul>
    <li><a href="/dashboard">Dashboard</a></li>
    <li><a href="/cashin" class="active">Cash In</a></li>
    <li><a href="/cashout">Cash Out</a></li>
    <li><a href="/inbox">History</a></li>
    <li><a href="/barcode">My QR</a></li>
    <li><a href="/profile">Profile</a></li>
  </ul>
  <div class="nav-right">
    <span>₱<span style="color:#00c896;font-weight:700" id="nav-balance">0.00</span></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>
<main>
  <div class="card">
    <div class="card-header">
      <div class="card-icon">↓</div>
      <div class="card-title">
        <h2>Cash In</h2>
        <p>Add money to your Gee.KasZsx wallet</p>
      </div>
    </div>
    <div class="balance-badge">
      Current Balance: <strong>₱<span id="balance">0.00</span></strong>
    </div>
    <label>Amount (₱)</label>
    <div class="quick-amounts">
      <button class="quick-btn" onclick="setAmount(100)">₱100</button>
      <button class="quick-btn" onclick="setAmount(500)">₱500</button>
      <button class="quick-btn" onclick="setAmount(1000)">₱1,000</button>
      <button class="quick-btn" onclick="setAmount(5000)">₱5,000</button>
    </div>
    <div class="input-wrap">
      <span class="icon">₱</span>
      <input type="number" id="amount" placeholder="0.00" min="1" step="0.01"/>
    </div>
    <label>Description (optional)</label>
    <div class="input-wrap">
      <span class="icon">📝</span>
      <input type="text" id="description" placeholder="e.g. GCash load, Bank transfer..."/>
    </div>
    <button class="submit" onclick="doCashIn()">Cash In Now</button>
    <div class="msg" id="msg" style="display:none"></div>
  </div>
</main>
<footer>&copy; 2025 Gee.KasZsx</footer>
<script>
async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href='/'; }
function setAmount(v) { document.getElementById('amount').value = v; }
async function loadUser() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href='/'; return; }
  const u = await r.json();
  document.getElementById('balance').textContent = parseFloat(u.balance).toFixed(2);
  document.getElementById('nav-balance').textContent = parseFloat(u.balance).toFixed(2);
}
async function doCashIn() {
  const amount = document.getElementById('amount').value;
  const description = document.getElementById('description').value;
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  if (!amount || parseFloat(amount) <= 0) {
    msg.className='msg error'; msg.textContent='Enter a valid amount.'; msg.style.display='block'; return;
  }
  const fd = new FormData();
  fd.append('amount', amount);
  fd.append('description', description || 'Cash In');
  const r = await fetch('/api/cashin', {method:'POST', body:fd});
  const d = await r.json();
  if (d.success) {
    msg.className='msg success';
    msg.textContent = `✓ Cash in successful! Ref: ${d.referenceNo} | New Balance: ₱${parseFloat(d.newBalance).toFixed(2)}`;
    document.getElementById('amount').value = '';
    document.getElementById('description').value = '';
    document.getElementById('balance').textContent = parseFloat(d.newBalance).toFixed(2);
    document.getElementById('nav-balance').textContent = parseFloat(d.newBalance).toFixed(2);
  } else {
    msg.className='msg error'; msg.textContent = d.message || 'Cash in failed.';
  }
  msg.style.display='block';
}
loadUser();
</script>
</body>
</html>
