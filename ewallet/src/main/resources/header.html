<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eWallet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
    nav {
      background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    nav .brand { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; color: #e94560; }
    nav .brand span { color: #fff; }
    nav ul { list-style: none; display: flex; gap: 20px; }
    nav ul li a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    nav ul li a:hover, nav ul li a.active { color: #e94560; }
    .user-info { font-size: 0.85rem; color: #aaa; }
    #nav-balance { color: #4ade80; font-weight: 600; }
  </style>
</head>
<body>
<nav>
  <div class="brand">e<span>Wallet</span></div>
  <ul>
    <li><a href="/dashboard">Dashboard</a></li>
    <li><a href="/cashin">Cash In</a></li>
    <li><a href="/cashout">Cash Out</a></li>
    <li><a href="/inbox">Inbox</a></li>
    <li><a href="/barcode">My QR</a></li>
    <li><a href="/profile">Profile</a></li>
  </ul>
  <div class="user-info">
    Hi, <span id="nav-username">...</span> &nbsp;|&nbsp;
    Balance: ₱<span id="nav-balance">0.00</span>
    &nbsp;&nbsp;
    <a href="#" onclick="logout()" style="color:#e94560;">Logout</a>
  </div>
</nav>
<script>
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/';
}
async function loadNav() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href = '/'; return; }
  const u = await r.json();
  document.getElementById('nav-username').textContent = u.username;
  document.getElementById('nav-balance').textContent = parseFloat(u.balance).toFixed(2);
}
loadNav();
</script>
