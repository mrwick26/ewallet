<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gee.KasZsx — My QR Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: #161b22; border-bottom: 1px solid #21262d; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .brand { font-size: 1.25rem; font-weight: 800; color: #fff; }
    .brand span { color: #00c896; }
    nav ul { list-style: none; display: flex; gap: 4px; }
    nav ul li a { color: #6e7681; text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 7px 14px; border-radius: 8px; transition: all 0.15s; }
    nav ul li a:hover { color: #e6edf3; background: #21262d; }
    nav ul li a.active { color: #00c896; background: rgba(0,200,150,0.1); }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .logout-btn { padding: 6px 14px; background: transparent; border: 1px solid #21262d; color: #8b949e; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-family: inherit; transition: all 0.15s; width: auto; }
    .logout-btn:hover { border-color: #f85149; color: #f85149; transform: none; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 20px; padding: 36px 32px; width: 100%; max-width: 380px; text-align: center; }
    .card h2 { font-size: 1.1rem; font-weight: 700; color: #e6edf3; margin-bottom: 4px; }
    .card .sub { font-size: 0.82rem; color: #6e7681; margin-bottom: 28px; }
    .qr-container {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    #qr-canvas { display: block; }
    .user-info-card { background: #0d1117; border: 1px solid #21262d; border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: left; }
    .user-info-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #21262d; font-size: 0.85rem; }
    .user-info-row:last-child { border-bottom: none; }
    .user-info-row .k { color: #6e7681; }
    .user-info-row .v { color: #e6edf3; font-weight: 600; }
    .balance-display { font-size: 1.9rem; font-weight: 800; color: #00c896; margin-bottom: 4px; }
    .balance-label { font-size: 0.78rem; color: #484f58; margin-bottom: 20px; }
    .copy-btn { padding: 10px 24px; background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: inherit; transition: all 0.15s; width: auto; }
    .copy-btn:hover { background: #30363d; border-color: #00c896; color: #00c896; transform: none; }
    footer { background: #161b22; border-top: 1px solid #21262d; color: #484f58; text-align: center; padding: 14px; font-size: 0.78rem; }
  </style>
</head>
<body>
<nav>
  <div class="brand">Gee.<span>KasZsx</span></div>
  <ul>
    <li><a href="/dashboard">Dashboard</a></li>
    <li><a href="/cashin">Cash In</a></li>
    <li><a href="/cashout">Cash Out</a></li>
    <li><a href="/inbox">History</a></li>
    <li><a href="/barcode" class="active">My QR</a></li>
    <li><a href="/profile">Profile</a></li>
  </ul>
  <div class="nav-right">
    <span>₱<span style="color:#00c896;font-weight:700" id="nav-balance">0.00</span></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>
<main>
  <div class="card">
    <h2>My QR Code</h2>
    <p class="sub">Share this to receive payments</p>
    <div class="qr-container">
      <canvas id="qr-canvas" width="200" height="200"></canvas>
    </div>
    <div class="user-info-card">
      <div class="user-info-row"><span class="k">Name</span><span class="v" id="info-name">—</span></div>
      <div class="user-info-row"><span class="k">Phone</span><span class="v" id="info-phone">—</span></div>
      <div class="user-info-row"><span class="k">Email</span><span class="v" id="info-email">—</span></div>
    </div>
    <div class="balance-display">₱<span id="info-balance">0.00</span></div>
    <div class="balance-label">Current balance</div>
    <button class="copy-btn" onclick="copyId()">Copy Wallet ID</button>
  </div>
</main>
<footer>&copy; 2026 Gee.KasZsx — Secure Digital Payments</footer>
<script>
let userId = null;
async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href='/'; }
function copyId() {
  navigator.clipboard.writeText('geekaszsx:user:' + userId).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy Wallet ID', 2000);
  });
}
function drawQR(canvas, text) {
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, size, size);
  const hash = [...text].reduce((a, c) => (a * 31 + c.charCodeAt(0)) | 0, 0);
  const cells = 25;
  const cell = size / cells;
  const margin = 2;
  ctx.fillStyle = '#1a1a1a';
  // Draw data cells
  for (let r = 0; r < cells; r++) {
    for (let c = 0; c < cells; c++) {
      const inFinder = (r < 8 && c < 8) || (r < 8 && c >= cells - 8) || (r >= cells - 8 && c < 8);
      if (inFinder) continue;
      if (r === 6 || c === 6) { // timing pattern
        if ((r + c) % 2 === 0) ctx.fillRect(c*cell+margin, r*cell+margin, cell-margin*2, cell-margin*2);
        continue;
      }
      const val = (hash ^ (r * 73856093) ^ (c * 19349663) ^ (r*c*104729)) & 1;
      if (val) {
        ctx.beginPath();
        ctx.roundRect(c*cell+margin, r*cell+margin, cell-margin*2, cell-margin*2, 1.5);
        ctx.fill();
      }
    }
  }
  // Finder patterns — clean squares
  function drawFinder(x, y) {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x*cell, y*cell, 7*cell, 7*cell);
    ctx.fillStyle = '#fff';
    ctx.fillRect((x+1)*cell, (y+1)*cell, 5*cell, 5*cell);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect((x+2)*cell, (y+2)*cell, 3*cell, 3*cell);
  }
  drawFinder(0, 0);
  drawFinder(cells - 7, 0);
  drawFinder(0, cells - 7);
  // Separators
  ctx.fillStyle = '#fff';
  [[0,7],[7,0],[cells-8,0],[0,cells-8],[cells-8,cells-8],[cells-1,0]].forEach(([c,r]) => {});
}
async function loadUser() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href='/'; return; }
  const u = await r.json();
  userId = u.id;
  document.getElementById('info-name').textContent = u.fullName;
  document.getElementById('info-phone').textContent = u.phone;
  document.getElementById('info-email').textContent = u.email;
  document.getElementById('info-balance').textContent = parseFloat(u.balance).toFixed(2);
  document.getElementById('nav-balance').textContent = parseFloat(u.balance).toFixed(2);
  drawQR(document.getElementById('qr-canvas'), 'geekaszsx:user:' + u.id + ':' + u.phone);
}
loadUser();
</script>
</body>
</html>
