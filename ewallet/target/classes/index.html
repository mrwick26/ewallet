<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gee.KasZsx — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,200,150,0.15) 0%, transparent 70%);
      top: -150px; right: -100px; border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      bottom: -100px; left: -80px; border-radius: 50%;
    }
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #00c896, #00a876);
      border-radius: 16px;
      font-size: 1.8rem; margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(0,200,150,0.35);
    }
    .logo h1 { font-size: 1.7rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .logo h1 span { color: #00c896; }
    .logo p { color: #6e7681; font-size: 0.85rem; margin-top: 4px; }
    label { font-size: 0.8rem; font-weight: 600; color: #8b949e; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem; }
    input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: #0d1117;
      border: 1.5px solid #21262d;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #e6edf3;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus { border-color: #00c896; }
    input::placeholder { color: #484f58; }
    .pin-dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #21262d; background: transparent;
      transition: all 0.2s;
    }
    .pin-dot.filled { background: #00c896; border-color: #00c896; }
    .pin-input-hidden {
      position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none;
    }
    .pin-field-wrap {
      cursor: pointer; margin-bottom: 20px;
    }
    .pin-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .pin-label-row label { margin: 0; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00c896, #00a876);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
      letter-spacing: 0.3px;
    }
    button:hover { opacity: 0.92; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .msg { margin-top: 14px; text-align: center; font-size: 0.85rem; padding: 10px 14px; border-radius: 8px; }
    .msg.error { background: rgba(248,81,73,0.12); color: #f85149; border: 1px solid rgba(248,81,73,0.2); }
    .msg.success { background: rgba(0,200,150,0.1); color: #00c896; border: 1px solid rgba(0,200,150,0.2); }
    .footer-link { text-align: center; margin-top: 22px; font-size: 0.85rem; color: #6e7681; }
    .footer-link a { color: #00c896; font-weight: 600; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">💸</div>
    <h1>Gee.<span>KasZsx</span></h1>
    <p>Your secure digital wallet</p>
  </div>
  <label>Phone Number</label>
  <div class="input-wrap">
    <span class="icon">📱</span>
    <input type="tel" id="phone" placeholder="+63 9XX XXX XXXX" />
  </div>
  <div class="pin-label-row">
    <label>PIN</label>
  </div>
  <div class="pin-field-wrap" onclick="document.getElementById('pin-hidden').focus()">
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <input type="password" id="pin-hidden" class="pin-input-hidden" maxlength="6" inputmode="numeric" />
  </div>
  <button onclick="login()">Login</button>
  <div class="msg" id="msg" style="display:none"></div>
  <div class="footer-link">Don't have an account? <a href="/signup">Sign Up</a></div>
</div>
<script>
const pinHidden = document.getElementById('pin-hidden');
const dots = document.querySelectorAll('.pin-dot');
pinHidden.addEventListener('input', () => {
  const v = pinHidden.value;
  dots.forEach((d, i) => d.classList.toggle('filled', i < v.length));
});
pinHidden.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('phone').addEventListener('keydown', e => {
  if (e.key === 'Enter') pinHidden.focus();
});

async function login() {
  const phone = document.getElementById('phone').value.trim();
  const pin = pinHidden.value;
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  if (!phone || !pin) { msg.className='msg error'; msg.textContent='Please enter phone number and PIN.'; msg.style.display='block'; return; }
  const fd = new FormData();
  fd.append('phone', phone);
  fd.append('pin', pin);
  const r = await fetch('/api/login', { method: 'POST', body: fd });
  const d = await r.json();
  if (d.success) {
    msg.className='msg success'; msg.textContent='✓ Login successful! Redirecting...'; msg.style.display='block';
    setTimeout(() => window.location.href = '/dashboard', 700);
  } else {
    msg.className='msg error'; msg.textContent = d.message || 'Login failed.'; msg.style.display='block';
    pinHidden.value = ''; dots.forEach(d => d.classList.remove('filled'));
  }
}
</script>
</body>
</html>
